<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080c14">
  <title>复盘 · Chrono100</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #080c14;
      --bg2:        #0d1220;
      --surface:    rgba(255,255,255,0.04);
      --surface-hi: rgba(255,255,255,0.07);
      --border:     rgba(255,255,255,0.08);
      --border-hi:  rgba(255,255,255,0.15);

      /* accent: electric teal */
      --acc:        #00e5c3;
      --acc-dim:    rgba(0,229,195,0.45);
      --acc-faint:  rgba(0,229,195,0.12);
      --acc-glow:   rgba(0,229,195,0.22);

      /* mood palette */
      --mood-great: #00e5c3;
      --mood-good:  #4db8ff;
      --mood-ok:    #a78bfa;
      --mood-low:   #fb923c;
      --mood-hard:  #f87171;

      --text:       rgba(255,255,255,0.90);
      --text-dim:   rgba(255,255,255,0.50);
      --text-faint: rgba(255,255,255,0.25);

      --r:  16px;
      --rp: 40px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      min-height: 100dvh;
      font-family: 'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ambient layers ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 45% at 80% 10%, rgba(0,229,195,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 90%, rgba(77,184,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 30% 25% at 50% 50%, rgba(167,139,250,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── grain ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    /* ── layout ── */
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 100px;
      position: relative; z-index: 1;
    }

    /* ── header ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 52px 0 32px;
    }

    .topbar-left h1 {
      font-family: 'Instrument Serif', 'ZCOOL XiaoWei', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    .topbar-left h1 em {
      font-style: italic;
      color: var(--acc);
    }
    .topbar-date {
      font-size: 11.5px;
      color: var(--text-faint);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    .topbar-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hi);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .topbar-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── section label ── */
    .sec-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── tab bar (week / month) ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--rp);
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 7px 0;
      border-radius: 30px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.22s;
      border: none; background: transparent;
      font-family: inherit;
    }
    .tab.active {
      background: var(--acc-faint);
      color: var(--acc);
      border: 1px solid var(--acc-dim);
    }

    /* ── RECAP CARD ── */
    .recap-card {
      background: linear-gradient(135deg, rgba(0,229,195,0.1), rgba(77,184,255,0.05));
      border: 1px solid rgba(0,229,195,0.2);
      border-radius: var(--r);
      padding: 22px 22px 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .recap-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,195,0.12), transparent 70%);
      pointer-events: none;
    }

    .recap-title {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: var(--acc-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .recap-text {
      font-size: 15px;
      line-height: 1.95;
      color: rgba(255,255,255,0.85);
      font-weight: 300;
    }
    .recap-stats {
      display: flex;
      gap: 14px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(0,229,195,0.12);
    }
    .recap-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .recap-stat-n {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--acc);
      line-height: 1;
    }
    .recap-stat-l {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.5px;
    }

    /* ── MOOD CARD ── */
    .mood-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      margin-bottom: 16px;
    }

    .mood-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: var(--rp);
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
    }
    .mood-emoji { font-size: 18px; }

    .mood-bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .mood-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mood-bar-label {
      font-size: 11px;
      color: var(--text-faint);
      width: 28px;
      flex-shrink: 0;
    }
    .mood-bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .mood-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.22,1,0.36,1);
    }
    .mood-desc {
      font-size: 13.5px;
      line-height: 1.85;
      color: var(--text-dim);
      margin-top: 14px;
      font-weight: 300;
    }

    /* ── GROWTH / TREND CARD ── */
    .growth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      margin-bottom: 16px;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 4px;
    }
    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .week-day-label {
      font-size: 9px;
      color: var(--text-faint);
      letter-spacing: 0.5px;
    }
    .week-day-dot {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.3s;
    }
    .week-day-dot.today {
      border: 1.5px solid var(--acc);
    }
    .week-day-dot.empty {
      background: rgba(255,255,255,0.04);
      color: var(--text-faint);
    }
    .week-day-dot.has-1  { background: rgba(0,229,195,0.12); color: var(--acc); }
    .week-day-dot.has-2  { background: rgba(0,229,195,0.22); color: var(--acc); }
    .week-day-dot.has-3  { background: rgba(0,229,195,0.35); color: var(--bg); font-weight:700; }

    .growth-insight {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-dim);
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-weight: 300;
    }
    .growth-insight strong {
      color: var(--acc-dim);
      font-weight: 500;
    }

    /* ── REFLECTION CARD ── */
    .reflect-card {
      background: linear-gradient(160deg, rgba(167,139,250,0.08), rgba(77,184,255,0.05));
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: var(--r);
      padding: 24px 22px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .reflect-card::after {
      content: '"';
      position: absolute;
      bottom: -10px; right: 14px;
      font-family: 'Instrument Serif', serif;
      font-size: 100px;
      color: rgba(167,139,250,0.08);
      line-height: 1;
      pointer-events: none;
    }

    .reflect-title {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: rgba(167,139,250,0.6);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .reflect-text {
      font-size: 15.5px;
      line-height: 2.1;
      color: rgba(255,255,255,0.82);
      font-weight: 300;
      font-family: 'Noto Sans SC', serif;
      position: relative;
    }
    .reflect-time {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 14px;
      text-align: right;
      letter-spacing: 0.5px;
    }

    /* ── MOMENTS LIST ── */
    .moment-item {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateX(-10px);
      animation: slideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .moment-item:last-child { border-bottom: none; }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .moment-dot {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: var(--surface-hi);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .moment-body { flex: 1; min-width: 0; }
    .moment-content {
      font-size: 13.5px;
      color: rgba(255,255,255,0.80);
      line-height: 1.65;
      font-weight: 300;
    }
    .moment-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .moment-time { font-size: 11px; color: var(--text-faint); }
    .moment-tag {
      font-size: 10.5px;
      color: var(--acc-dim);
      background: var(--acc-faint);
      padding: 2px 8px;
      border-radius: var(--rp);
    }

    /* ── LOADING ── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80dvh;
      gap: 20px;
    }

    .spinner {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      border-top-color: var(--acc);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-size: 13px;
      color: var(--text-faint);
      letter-spacing: 1px;
    }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80dvh;
      text-align: center;
      gap: 14px;
    }
    .login-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin-bottom: 8px;
    }
    .login-title {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      color: var(--text);
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-faint);
      line-height: 1.7;
      max-width: 280px;
    }
    .login-form {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .login-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 16px;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--acc-dim); }
    .login-input::placeholder { color: var(--text-faint); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: var(--r);
      background: var(--acc);
      color: #080c14;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: all 0.22s;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover { background: #00ffd6; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-hi);
      border-radius: var(--r);
      padding: 10px 20px;
      color: var(--text-dim);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--acc-dim); color: var(--acc); }

    .err-msg {
      font-size: 12.5px;
      color: #f87171;
      text-align: center;
    }

    /* ── EMPTY STATE ── */
    .empty-box {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-faint);
      font-size: 13px;
      line-height: 1.8;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(8,12,20,0.95);
      border: 1px solid var(--border-hi);
      border-radius: var(--rp);
      padding: 10px 22px;
      font-size: 13px;
      color: var(--acc);
      opacity: 0;
      transition: all 0.28s;
      pointer-events: none;
      z-index: 99;
      white-space: nowrap;
      backdrop-filter: blur(12px);
    }
    .toast.show { opacity:1; transform: translateX(-50%) translateY(0); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 max(14px, env(safe-area-inset-bottom));
      z-index: 10;
    }
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--text-faint);
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      padding: 4px 16px;
      transition: color 0.2s;
      letter-spacing: 0.5px;
    }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn.active { color: var(--acc); }

    /* ── SECTION SPACING ── */
    .section { margin-bottom: 28px; }

    /* ── ANIMATE IN ── */
    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  </style>
</head>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   CONFIG
================================================================ */
const SUPA_URL  = 'https://flerfkkbzrnxreszxmcd.supabase.co'
const ANON_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsZXJma2tienJueHJlc3p4bWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjUxNzgsImV4cCI6MjA4OTU0MTE3OH0.kzdoWECmd9vGoLQpLMxjCx0Cf2tf1CTKDZOtL0X1O98'
const AI_FN     = `${SUPA_URL}/functions/v1/clever-task`

/* ================================================================
   STATE
================================================================ */
let STATE = {
  session: null,   // { access_token, user }
  profile: null,
  view: 'today',   // today | week | month
  todayMoments: [],
  weekData: [],    // [{date, count}] x7
  aiData: null,    // { recap, mood, moodScore, growth, reflection }
  loading: false,
}

/* ================================================================
   UTILS
================================================================ */
const $ = id => document.getElementById(id)
const app = () => document.getElementById('app')

function toast(msg, ms=2200) {
  const el = $('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), ms)
}

function esc(s) {
  if (!s) return ''
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function todayISO() {
  const d = new Date(); d.setHours(0,0,0,0)
  return d.toISOString()
}

function dateLabel() {
  const d = new Date()
  const days = ['日','一','二','三','四','五','六']
  return `${d.getMonth()+1}月${d.getDate()}日 · 星期${days[d.getDay()]}`
}

function timeLabel(ts) {
  const d = new Date(ts)
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
}

const TYPE_MAP = {
  meeting:  {icon:'💼',label:'会议'}, work:{icon:'💻',label:'工作'},
  homework: {icon:'📚',label:'作业'}, study:{icon:'🎓',label:'学习'},
  finance:  {icon:'💰',label:'财务'}, diary:{icon:'📔',label:'日记'},
  food:     {icon:'🍜',label:'美食'}, travel:{icon:'✈️',label:'出行'},
  family:   {icon:'👨‍👩‍👧',label:'家人'}, health:{icon:'💊',label:'健康'},
  photo:    {icon:'📷',label:'照片'}, default:{icon:'✨',label:'生活'},
}
function typeInfo(cat) { return TYPE_MAP[cat?.toLowerCase()] || TYPE_MAP.default }

/* ================================================================
   AUTH — session stored in localStorage
================================================================ */
function loadSession() {
  try {
    const raw = localStorage.getItem('chrono_session')
    if (!raw) return null
    const s = JSON.parse(raw)
    // check expiry (exp is in seconds)
    if (s.expires_at && Date.now()/1000 > s.expires_at) {
      localStorage.removeItem('chrono_session')
      return null
    }
    return s
  } catch { return null }
}

function saveSession(s) {
  localStorage.setItem('chrono_session', JSON.stringify(s))
}

function clearSession() {
  localStorage.removeItem('chrono_session')
  STATE.session = null
  STATE.profile = null
}

async function signIn(email, password) {
  const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: {
      'apikey': ANON_KEY,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ email, password }),
  })
  const data = await res.json()
  if (!res.ok) throw new Error(data.error_description || data.msg || '登录失败')
  return data  // { access_token, refresh_token, expires_at, user }
}

/* ================================================================
   SUPABASE REST (authenticated)
================================================================ */
async function supa(path, opts={}) {
  const token = STATE.session?.access_token || ANON_KEY
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    headers: {
      'apikey':        ANON_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type':  'application/json',
      ...opts.headers,
    },
    ...opts,
  })
  if (!res.ok) {
    const t = await res.text().catch(()=>'')
    throw new Error(`${res.status}: ${t.slice(0,100)}`)
  }
  return res.json()
}

/* ================================================================
   AI — generate all 4 insights in one call
================================================================ */
async function generateInsights(profile, moments, weekData) {
  const name = profile.real_name || profile.username || '你'

  const momentList = moments.map((m,i) => {
    const t = typeInfo(m.category)
    const ai = m.ai_insight ? `[AI:${m.ai_insight.slice(0,60)}]` : ''
    return `${i+1}.[${t.label}] ${(m.content||'').slice(0,80)} ${ai}`
  }).join('\n') || '（今天还没有记录）'

  const weekSummary = weekData.map(d => `${d.label}:${d.count}条`).join(' ')

  const prompt =
`你是用户${name}的私人AI复盘助手，只为用户本人服务，绝对保密。

今日记录（${moments.length}条）：
${momentList}

本周每日记录数：${weekSummary}

请生成以下4个模块，仅返回JSON，无Markdown：

{
  "recap": "今日复盘段落（60-90字）：总结今天做了什么、有何进展、哪里有待改进。语气直接诚实，像自己跟自己说话。",
  "mood": "今日情绪状态词（2-4字，如：平静专注 / 有些焦虑 / 充实愉快 / 疲惫但充实）",
  "moodEmoji": "一个最符合今日情绪的emoji",
  "moodColor": "用以下其中一个值：great/good/ok/low/hard",
  "moodBars": {
    "专注度": 75,
    "充实感": 60,
    "愉悦度": 55
  },
  "moodDesc": "情绪分析（35-55字）：今天情绪波动的原因分析，客观真实。",
  "growth": "成长洞察（45-65字）：根据本周记录规律，指出一个正在形成的好习惯或需要注意的模式。",
  "reflection": "今日感悟（55-80字）：像写给未来自己的一句话，深刻但不鸡汤，真实而有温度。"
}`

  const res = await fetch(AI_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: prompt }),
  })
  if (!res.ok) throw new Error(`AI ${res.status}`)
  const data = await res.json()

  const raw = (
    data.reply || data.content || data.message ||
    (Array.isArray(data.content) ? data.content.map(b=>b.text||'').join('') : '') ||
    ''
  ).replace(/```json|```/g,'').trim()

  try { return JSON.parse(raw) }
  catch {
    return {
      recap: '今天的记录已收到，AI 分析暂时无法生成，明天再试试。',
      mood: '平静', moodEmoji: '😌', moodColor: 'ok',
      moodBars: { 专注度:50, 充实感:50, 愉悦度:50 },
      moodDesc: '今天情绪较为平稳，继续保持。',
      growth: '本周记录数据不足，继续坚持记录，7天后可以看到趋势分析。',
      reflection: '每一天的记录，都是给未来自己的一封信。',
    }
  }
}

/* ================================================================
   FETCH DATA
================================================================ */
async function fetchData() {
  const uid = STATE.session.user.id

  // Profile
  const profiles = await supa(`profiles?id=eq.${uid}&select=id,username,real_name,city,avatar_url&limit=1`)
  STATE.profile = profiles[0] || { username: STATE.session.user.email }

  // Today's moments
  STATE.todayMoments = await supa(
    `moments?user_id=eq.${uid}&created_at=gte.${todayISO()}&order=created_at.asc&select=id,content,category,image_url,ai_insight,created_at`
  )

  // Week data (last 7 days)
  const weekStart = new Date()
  weekStart.setDate(weekStart.getDate() - 6)
  weekStart.setHours(0,0,0,0)

  const weekMoments = await supa(
    `moments?user_id=eq.${uid}&created_at=gte.${weekStart.toISOString()}&select=created_at`
  )

  // Build 7-day grid
  const dayLabels = ['日','一','二','三','四','五','六']
  STATE.weekData = []
  for (let i = 6; i >= 0; i--) {
    const d = new Date()
    d.setDate(d.getDate() - i)
    const dateStr = d.toISOString().slice(0,10)
    const count = weekMoments.filter(m => m.created_at.slice(0,10) === dateStr).length
    const isToday = i === 0
    STATE.weekData.push({
      label: dayLabels[d.getDay()],
      dateStr,
      count,
      isToday,
    })
  }

  // AI insights (cache by date)
  const cacheK = `reflect_ai_${uid}_${new Date().toISOString().slice(0,10)}`
  const cached = localStorage.getItem(cacheK)
  if (cached) {
    try { STATE.aiData = JSON.parse(cached); return }
    catch { localStorage.removeItem(cacheK) }
  }

  if (STATE.todayMoments.length > 0) {
    STATE.aiData = await generateInsights(STATE.profile, STATE.todayMoments, STATE.weekData)
    localStorage.setItem(cacheK, JSON.stringify(STATE.aiData))
  }
}

/* ================================================================
   MOOD COLOR HELPER
================================================================ */
function moodColor(key) {
  const map = { great:'var(--mood-great)', good:'var(--mood-good)', ok:'var(--mood-ok)', low:'var(--mood-low)', hard:'var(--mood-hard)' }
  return map[key] || map.ok
}

          <p class="err-msg" id="loginErr"></p>
          <button class="btn-primary" id="loginBtn" onclick="doLogin()">进入我的复盘</button>

    ? `<img src="${esc(p.avatar_url)}" alt="" onerror="this.parentElement.textContent='🌿'">`
    : '🌿'

  // ── week grid ──
  const weekGrid = wd.map(d => {
    const cls = d.isToday ? 'today' : ''
    const densityCls = d.count === 0 ? 'empty' : d.count === 1 ? 'has-1' : d.count <= 3 ? 'has-2' : 'has-3'
    return `<div class="week-day">
      <span class="week-day-label">${d.label}</span>
      <div class="week-day-dot ${cls} ${densityCls}">${d.count || '·'}</div>
    </div>`
  }).join('')

  // ── mood bars ──
  const bars = ai?.moodBars ? Object.entries(ai.moodBars).map(([k,v]) => `
    <div class="mood-bar-row">
      <span class="mood-bar-label">${esc(k)}</span>
      <div class="mood-bar-track">
        <div class="mood-bar-fill" style="width:${v}%;background:${moodColor(ai.moodColor)}"></div>
      </div>
      <span style="font-size:11px;color:var(--text-faint);width:28px;text-align:right">${v}%</span>
    </div>`).join('') : ''

  // ── moments list ──
  const momentItems = ms.length ? ms.map((m,i) => {
    const t   = typeInfo(m.category)
    const delay = (i*0.07).toFixed(2)
    return `<div class="moment-item" style="animation-delay:${delay}s">
      <div class="moment-dot">${t.icon}</div>
      <div class="moment-body">
        <p class="moment-content">${esc(m.content || '（照片记录）')}</p>
        <div class="moment-meta">
          <span class="moment-time">${timeLabel(m.created_at)}</span>
          <span class="moment-tag">${t.label}</span>
        </div>
      </div>
    </div>`
  }).join('') : `<div class="empty-box"><div class="empty-icon">📭</div>今天还没有记录<br>去主App添加第一条吧</div>`

  const totalCount = wd.reduce((s,d)=>s+d.count,0)
  const activeDays = wd.filter(d=>d.count>0).length

  app().innerHTML = `
    <div class="wrap">

      <!-- TOPBAR -->
      <div class="topbar fade-up">
        <div class="topbar-left">
          <h1>今日<em>复盘</em></h1>

        </div>

          ${ai ? `<div class="recap-stats">
            <div class="recap-stat">
              <span class="recap-stat-n">${ms.length}</span>
              <span class="recap-stat-l">今日记录</span>
            </div>
            <div class="recap-stat">
              <span class="recap-stat-n">${totalCount}</span>
              <span class="recap-stat-l">本周总计</span>
            </div>
            <div class="recap-stat">
              <span class="recap-stat-n">${activeDays}</span>
              <span class="recap-stat-l">活跃天数</span>
            </div>
          </div>` : ''}
        </div>
      </div>

      <!-- MOOD -->
      ${ai ? `<div class="section fade-up" style="animation-delay:0.14s">
        <p class="sec-label">情绪分析</p>
        <div class="mood-card">
          <div class="mood-badge" style="background:${moodColor(ai.moodColor)}22;border:1px solid ${moodColor(ai.moodColor)}55;color:${moodColor(ai.moodColor)}">
            <span class="mood-emoji">${esc(ai.moodEmoji)}</span>
            <span>${esc(ai.mood)}</span>
          </div>
          <div class="mood-bar-wrap">${bars}</div>
          <p class="mood-desc">${esc(ai.moodDesc)}</p>
        </div>
      </div>` : ''}

      <!-- GROWTH / WEEK GRID -->
      <div class="section fade-up" style="animation-delay:0.2s">
        <p class="sec-label">成长轨迹 · 本周</p>
        <div class="growth-card">
          <div class="week-grid">${weekGrid}</div>
          ${ai ? `<p class="growth-insight">${esc(ai.growth)}</p>` : ''}
        </div>
      </div>

      <!-- TODAY'S MOMENTS -->
      <div class="section fade-up" style="animation-delay:0.26s">
        <p class="sec-label">今日记录 · ${ms.length}条</p>
        <div>${momentItems}</div>
      </div>

      <!-- REFLECTION -->

        <p class="sec-label">晚间感悟</p>

          <p class="reflect-title">✦ Tonight's Reflection</p>
          <p class="reflect-text">${esc(ai.reflection)}</p>

    <!-- BOTTOM NAV -->

      </button>

      </button>
      <button class="nav-btn" onclick="window.location.href='ai.html'">

      </button>
    </nav>`

/* ================================================================
   ACTIONS
================================================================ */
async function doLogin() {
  const email = $('loginEmail')?.value.trim()
  const pass  = $('loginPassword')?.value

  if (!email || !pass) { $('loginErr').textContent = '请填写邮箱和密码'; return }

  $('loginBtn').disabled = true
  $('loginBtn').textContent = '登录中…'
  $('loginErr').textContent = ''

  try {
    const session = await signIn(email, pass)
    STATE.session = session
    saveSession(session)
    await boot()
  } catch(err) {
    $('loginErr').textContent = err.message
    $('loginBtn').disabled = false
    $('loginBtn').textContent = '进入我的复盘'
  }
}

function doLogout() {
  if (!confirm('确认退出登录？')) return
  clearSession()
  renderLogin()
  toast('已退出')
}

/* ================================================================
   BOOT
================================================================ */
async function boot() {
  STATE.session = STATE.session || loadSession()

  if (!STATE.session) {
    renderLogin()
    return
  }

  renderLoading('读取今日记录…')

  try {
    setLoadMsg('读取今日记录…')
    await fetchData()

    if (STATE.todayMoments.length > 0 && !STATE.aiData) {
      setLoadMsg('AI 正在复盘今天…')
    }

    renderMain()
  } catch(err) {
    console.error('[reflect]', err)

    if (err.message.includes('401') || err.message.includes('JWT')) {
      clearSession()
      renderLogin()
      return
    }

    app().innerHTML = `
      <div class="wrap">
        <div class="loading-screen">
          <div style="font-size:40px;opacity:0.4">⚡</div>
          <p style="color:var(--text-faint);font-size:13px;text-align:center;line-height:1.8">
            加载失败<br><span style="font-size:11px;opacity:0.6">${esc(err.message)}</span>
          </p>
          <button class="btn-ghost" onclick="boot()">重试</button>
        </div>
      </div>`
  }
}

boot()
</script>
