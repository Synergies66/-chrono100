<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>CHRONO100 · AI 感知</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070A12;--bg2:#0C0F1A;--card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);--card3:rgba(255,255,255,0.1);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.16);
  --ink:#EEF2FF;--ink2:rgba(238,242,255,0.7);--ink3:rgba(238,242,255,0.4);--ink4:rgba(238,242,255,0.18);
  --blue:#38BDF8;--blue-d:#0284C7;--blue-glow:rgba(56,189,248,0.12);
  --gold:#FBBF24;--gold-glow:rgba(251,191,36,0.1);
  --rose:#FB7185;--rose-glow:rgba(251,113,133,0.1);
  --violet:#A78BFA;--violet-glow:rgba(167,139,250,0.1);
  --emerald:#34D399;--emerald-glow:rgba(52,211,153,0.1);
  --cyan:#22D3EE;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:"DM Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:inherit;border:none;outline:none;background:none;color:inherit}
input,textarea{font-size:16px!important}
::-webkit-scrollbar{display:none}
#root{position:fixed;inset:0;display:flex;flex-direction:column}
.nav{flex-shrink:0;padding:calc(var(--st)+10px) 16px 12px;display:flex;align-items:center;gap:10px;background:rgba(7,10,18,0.9);backdrop-filter:blur(24px);border-bottom:0.5px solid var(--border);z-index:100}
.nav-btn{width:36px;height:36px;border-radius:50%;background:var(--card2);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--ink2);flex-shrink:0;transition:background .15s}
.nav-btn:active{background:var(--card3)}
.nav-mid{flex:1;text-align:center}
.nav-title{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.nav-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.nav-hist{font-size:11px;font-weight:500;color:var(--blue);cursor:pointer;padding:6px 12px;border-radius:20px;background:var(--blue-glow);border:0.5px solid rgba(56,189,248,0.18);white-space:nowrap}
.scroll{flex:1;overflow-y:auto;padding:14px 14px calc(28px + var(--sb));display:flex;flex-direction:column;gap:12px}
.capture-zone{border-radius:24px;border:1.5px dashed var(--border2);background:var(--card);cursor:pointer;transition:all .2s;overflow:hidden}
.capture-zone:active{transform:scale(0.99)}
.capture-zone.drag-over{border-color:var(--blue);background:var(--blue-glow)}
.cz-inner{padding:32px 20px 28px;display:flex;flex-direction:column;align-items:center;gap:14px}
.cz-ring{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(34,211,238,0.08));border:0.5px solid rgba(56,189,248,0.2);display:flex;align-items:center;justify-content:center;font-size:30px}
.cz-title{font-size:16px;font-weight:600;letter-spacing:-0.02em}
.cz-sub{font-size:12px;color:var(--ink3);text-align:center;line-height:1.7;max-width:260px}
.cz-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.cz-pill{font-size:12px;font-weight:500;padding:7px 14px;border-radius:20px;background:var(--card2);color:var(--ink2);border:0.5px solid var(--border2)}
input[type=file]{display:none}

.input-toggle{display:flex;gap:0;background:var(--card2);border-radius:14px;padding:3px;border:0.5px solid var(--border2);margin-bottom:2px}
.it-btn{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:500;border-radius:11px;cursor:pointer;transition:all .2s;color:var(--ink3)}
.it-btn.active{background:var(--blue-d);color:#fff}
.text-input-zone{display:none;flex-direction:column;gap:10px}
.text-input-zone.show{display:flex}
.txt-area{width:100%;min-height:120px;padding:14px;background:var(--card2);border:0.5px solid var(--border2);border-radius:16px;font-size:15px;color:var(--ink);resize:none;line-height:1.7}
.txt-area:focus{border-color:rgba(56,189,248,0.4);outline:none}
.txt-area::placeholder{color:var(--ink4)}
.txt-hint{font-size:11px;color:var(--ink4);text-align:center;line-height:1.6}

.photo-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.photo-grid{display:flex;gap:6px;padding:10px;overflow-x:auto}
.pg-item{width:72px;height:72px;border-radius:12px;flex-shrink:0;position:relative;overflow:hidden;border:1.5px solid var(--blue)}
.pg-item img{width:100%;height:100%;object-fit:cover}
.pg-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
.pg-add{width:72px;height:72px;border-radius:12px;flex-shrink:0;background:var(--card2);border:1.5px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer}
.pg-add-ico{font-size:22px;color:var(--ink3)}
.pg-add-txt{font-size:8px;color:var(--ink4);font-weight:500}
.analyze-btn{width:100%;padding:15px;border-radius:20px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:-0.01em;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;transition:all .2s}
.ab-ready{background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;box-shadow:0 8px 32px rgba(56,189,248,0.22)}
.ab-ready:active{transform:scale(0.98)}
.ab-loading{background:var(--card2);color:var(--blue);border:0.5px solid rgba(56,189,248,0.25);cursor:default}
.shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);transform:translateX(-100%);animation:shimmer 1.8s ease-in-out infinite}
@keyframes shimmer{to{transform:translateX(250%)}}
.scan-card{background:var(--card2);border-radius:20px;padding:16px;border:0.5px solid var(--border2)}
.scan-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.scan-orb{width:28px;height:28px;border-radius:50%;flex-shrink:0;position:relative}
.scan-orb-ring{width:100%;height:100%;border-radius:50%;border:3px solid transparent;border-top-color:var(--blue);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-title{font-size:13px;font-weight:600}
.scan-sub{font-size:10px;color:var(--ink3);margin-top:1px}
.scan-steps{display:flex;flex-direction:column;gap:7px}
.s-step{display:flex;align-items:center;gap:9px;font-size:11px}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .3s}
.sd-wait{background:var(--border2)}
.sd-active{background:var(--blue);animation:pulse-b .8s ease-in-out infinite;box-shadow:0 0 8px rgba(56,189,248,0.5)}
.sd-done{background:var(--emerald)}
@keyframes pulse-b{0%,100%{opacity:1}50%{opacity:0.35}}
.st-wait{color:var(--ink4)}
.st-active{color:var(--blue);font-weight:500}
.st-done{color:var(--emerald)}
.results{display:flex;flex-direction:column;gap:10px;animation:fadeup .4s cubic-bezier(.16,1,.3,1)}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.scene-badge{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;background:var(--card2);border:0.5px solid var(--border2)}
.scene-ico{font-size:24px;flex-shrink:0}
.scene-type{font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--blue);margin-bottom:2px}
.scene-desc{font-size:11px;color:var(--ink3)}
.conf-badge{margin-left:auto;font-size:9px;font-weight:500;padding:3px 8px;border-radius:8px;background:var(--emerald-glow);color:var(--emerald);border:0.5px solid rgba(52,211,153,0.2);flex-shrink:0}
.core-card{border-radius:20px;padding:16px;border:0.5px solid}
.cc-meeting{background:linear-gradient(145deg,rgba(56,189,248,0.06),rgba(14,165,233,0.02));border-color:rgba(56,189,248,0.14)}
.cc-homework{background:linear-gradient(145deg,rgba(251,113,133,0.06),rgba(244,63,94,0.02));border-color:rgba(251,113,133,0.14)}
.cc-classroom{background:linear-gradient(145deg,rgba(52,211,153,0.06),rgba(16,185,129,0.02));border-color:rgba(52,211,153,0.14)}
.cc-work{background:linear-gradient(145deg,rgba(167,139,250,0.06),rgba(139,92,246,0.02));border-color:rgba(167,139,250,0.14)}
.cc-finance{background:linear-gradient(145deg,rgba(251,191,36,0.06),rgba(245,158,11,0.02));border-color:rgba(251,191,36,0.14)}
.cc-reading{background:linear-gradient(145deg,rgba(34,211,238,0.06),rgba(6,182,212,0.02));border-color:rgba(34,211,238,0.14)}
.cc-general{background:var(--card2);border-color:var(--border2)}
.cc-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.cc-ico{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cc-lbl{font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--blue)}
.cc-text{font-family:"DM Serif Display",Georgia,serif;font-size:14px;font-style:italic;line-height:1.85}
.ct-meeting{color:rgba(186,230,253,0.9)}
.ct-homework{color:rgba(254,205,211,0.9)}
.ct-classroom{color:rgba(167,243,208,0.9)}
.ct-work{color:rgba(221,214,254,0.9)}
.ct-finance{color:rgba(253,230,138,0.9)}
.ct-reading{color:rgba(165,243,252,0.9)}
.ct-general{color:var(--ink2)}
.cur{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;animation:blink .7s step-end infinite;vertical-align:middle;border-radius:1px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ext-card{background:var(--card2);border-radius:16px;padding:13px 14px;border:0.5px solid var(--border2)}
.card-lbl{font-size:8px;font-weight:600;color:var(--ink4);letter-spacing:0.15em;margin-bottom:8px;text-transform:uppercase}
.ext-body{font-size:11px;color:var(--ink2);line-height:1.9;font-family:"DM Mono",monospace}
.h-blue{color:var(--blue);font-weight:500}
.h-gold{color:var(--gold);font-weight:500}
.h-rose{color:var(--rose);font-weight:500}
.h-emerald{color:var(--emerald);font-weight:500}
.actions-card{background:var(--card2);border-radius:20px;padding:14px;border:0.5px solid var(--border2)}
.ac-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ac-badge{font-size:8px;font-weight:600;padding:3px 9px;border-radius:10px}
.acb-red{background:rgba(251,113,133,0.12);color:var(--rose);border:0.5px solid rgba(251,113,133,0.2)}
.acb-gold{background:var(--gold-glow);color:var(--gold);border:0.5px solid rgba(251,191,36,0.2)}
.ac-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid var(--border)}
.ac-row:last-child{border:none;padding-bottom:0}
.ac-num{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.n1{background:linear-gradient(135deg,#EF4444,#F87171)}
.n2{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.n3{background:linear-gradient(135deg,#0284C7,#38BDF8)}
.n4{background:linear-gradient(135deg,#7C3AED,#A78BFA)}
.ac-body{flex:1;min-width:0}
.ac-title{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
.ac-detail{font-size:10px;color:var(--ink3);margin-top:3px;line-height:1.6}
.ac-tags{display:flex;gap:5px;margin-top:5px}
.at{font-size:8px;font-weight:500;padding:2px 8px;border-radius:8px;border:0.5px solid}
.at-today{background:rgba(251,113,133,0.08);color:var(--rose);border-color:rgba(251,113,133,0.2)}
.at-week{background:var(--gold-glow);color:var(--gold);border-color:rgba(251,191,36,0.2)}
.at-later{background:var(--blue-glow);color:var(--blue);border-color:rgba(56,189,248,0.2)}
.at-long{background:var(--violet-glow);color:var(--violet);border-color:rgba(167,139,250,0.2)}
.flag-card{border-radius:16px;padding:12px 13px;border:0.5px solid;margin:0}
.f-warn{background:rgba(251,191,36,0.05);border-color:rgba(251,191,36,0.15)}
.f-danger{background:rgba(251,113,133,0.05);border-color:rgba(251,113,133,0.15)}
.f-insight{background:var(--blue-glow);border-color:rgba(56,189,248,0.15)}
.f-good{background:var(--emerald-glow);border-color:rgba(52,211,153,0.15)}
.flag-row{display:flex;gap:9px;align-items:flex-start}
.flag-ico{font-size:15px;flex-shrink:0;margin-top:1px}
.flag-tit{font-size:11px;font-weight:600;margin-bottom:3px}
.ft-warn{color:var(--gold)}
.ft-danger{color:var(--rose)}
.ft-insight{color:var(--blue)}
.ft-good{color:var(--emerald)}
.flag-txt{font-size:10px;color:var(--ink3);line-height:1.65}
.deep-card{border-radius:20px;padding:14px 15px;background:linear-gradient(135deg,rgba(167,139,250,0.07),rgba(56,189,248,0.04));border:0.5px solid rgba(167,139,250,0.15)}
.deep-lbl{font-size:9px;font-weight:600;color:var(--violet);letter-spacing:0.12em;margin-bottom:7px;text-transform:uppercase}
.deep-txt{font-size:11px;color:rgba(220,210,255,0.78);line-height:1.78}
.save-section{background:var(--card2);border-radius:20px;padding:14px;border:0.5px solid var(--border2)}
.save-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.save-meta-ico{font-size:14px}
.save-meta-txt{font-size:11px;color:var(--ink2);flex:1}
.save-meta-badge{font-size:8px;padding:2px 8px;border-radius:8px;background:var(--emerald-glow);color:var(--emerald);border:0.5px solid rgba(52,211,153,0.2);font-weight:500}
.save-row{display:flex;gap:7px}
.s-btn{flex:1;padding:11px 8px;border-radius:14px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;border:0.5px solid;transition:all .18s}
.s-primary{background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border-color:transparent;box-shadow:0 4px 20px rgba(56,189,248,0.18)}
.s-primary:active{transform:scale(0.97)}
.s-sec{background:var(--card3);color:var(--ink2);border-color:var(--border2)}
.s-sec:active{background:var(--card2)}
.hist-panel{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;background:rgba(7,10,18,0.94);backdrop-filter:blur(28px)}
.hp-nav{padding:calc(var(--st)+12px) 16px 13px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border)}
.hp-body{flex:1;overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:8px}
.hp-item{background:var(--card2);border-radius:16px;padding:12px 13px;border:0.5px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:background .15s}
.hp-item:active{background:var(--card3)}
.hp-ico{width:36px;height:36px;border-radius:10px;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hp-content{flex:1;min-width:0}
.hp-title{font-size:12px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.hp-preview{font-size:10px;color:var(--ink3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hp-date{font-size:9px;color:var(--ink4);margin-top:4px}
.hp-empty{padding:80px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.hp-empty-ico{font-size:48px;opacity:0.2}
.hp-empty-txt{font-size:13px;color:var(--ink3);line-height:1.6}
.toast{position:fixed;top:calc(var(--st)+66px);left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(18,22,36,0.96);color:var(--ink);font-size:12px;font-weight:500;padding:10px 20px;border-radius:22px;border:0.5px solid var(--border2);backdrop-filter:blur(20px);z-index:9999;opacity:0;transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.amb{position:fixed;pointer-events:none;border-radius:50%;filter:blur(100px);opacity:0.04;z-index:-1}
</style>
</head>

<div class="amb" style="width:500px;height:500px;background:#38BDF8;top:-150px;right:-100px"></div>
<div class="amb" style="width:400px;height:400px;background:#A78BFA;bottom:-100px;left:-80px"></div>

<div id="root">
  <div class="nav">
    <div class="nav-btn" onclick="goBack()">&#8592;</div>

<button class="analyze-btn ab-ready" id="analyzeBtn" style="display:none" onclick="startAnalysis()">

  <div class="hp-body" id="histBody"></div>
</div>

function toast(msg, ms){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(function(){el.classList.remove('show');},ms||2500);
}

function triggerCapture(){ if(_busy)return; document.getElementById('fileInput').click(); }

function handleFiles(files){
  if(!files||!files.length)return;
  Array.from(files).forEach(function(f){
    if(_photos.length>=6){toast('最多6张');return;}
    // Compress image before storing
    compressImage(f, function(b64){
      _photos.push({b64:b64,name:f.name});
      renderPhotos();
    });
  });
}

function compressImage(file, callback){
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var MAX = 1024;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      var compressed = canvas.toDataURL('image/jpeg', 0.7);
      callback(compressed);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(i){ _photos.splice(i,1); renderPhotos(); }

function clearAll(){
  _photos=[];
  document.getElementById('resultsArea').innerHTML='';
  document.getElementById('analyzeBtn').style.display='none';

}

function renderPhotos(){
  if(!_photos.length){resetZone();document.getElementById('analyzeBtn').style.display='none';return;}
  var z=document.getElementById('captureZone');
  var items=_photos.map(function(p,i){
    return '<div class="pg-item"><img src="'+p.b64+'">'
      +'<div class="pg-del" onclick="event.stopPropagation();removePhoto('+i+')">&#215;</div></div>';
  }).join('');
  if(_photos.length<6) items+='<div class="pg-add" onclick="triggerCapture()"><div class="pg-add-ico">+</div><div class="pg-add-txt">添加</div></div>';
  z.onclick=null;
  z.innerHTML='<input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">'
    +'<div class="photo-header"><span style="font-size:11px;font-weight:500;color:var(--ink2)">&#128206; 已选 '+_photos.length+' 张</span>'
    +'<span style="font-size:10px;color:var(--rose);cursor:pointer;padding:4px 8px;border-radius:8px;background:var(--rose-glow)" onclick="clearAll()">清除</span></div>'
    +'<div class="photo-grid">'+items+'</div>';
  document.getElementById('analyzeBtn').style.display='flex';
}

function switchInput(mode){
  var isPhoto = mode==='photo';
  document.getElementById('btnPhoto').className='it-btn'+(isPhoto?' active':'');
  document.getElementById('btnText').className='it-btn'+(isPhoto?'':' active');
  document.getElementById('captureZone').style.display = isPhoto?'':'none';
  document.getElementById('textInputZone').className='text-input-zone'+(isPhoto?'':' show');
  // Show analyze btn if text has content
  if(!isPhoto){
    var ta=document.getElementById('textInput');
    document.getElementById('analyzeBtn').style.display = ta.value.trim()?'flex':'none';
    ta.oninput = function(){ document.getElementById('analyzeBtn').style.display=this.value.trim()?'flex':'none'; };
  } else {
    if(!_photos.length) document.getElementById('analyzeBtn').style.display='none';
  }
}

async function startAnalysis(){
  var _txtMode=document.getElementById("textInputZone")&&document.getElementById("textInputZone").classList.contains("show");
if(_busy||(!_photos.length&&!_txtMode))return;
  _busy=true;
  var btn=document.getElementById('analyzeBtn');
  btn.className='analyze-btn ab-loading';
  btn.innerHTML='<div class="shimmer"></div><span style="font-size:14px">&#128269;</span> AI 深度分析中&#8230;';

  var ra=document.getElementById('resultsArea');
  ra.innerHTML=buildScanUI();
  ra.scrollIntoView({behavior:'smooth',block:'start'});

  await animateScan();

  var content=[];
  var textZone=document.getElementById('textInputZone');
  var isTextMode = textZone && textZone.classList.contains('show');
  if(isTextMode){
    var userText=(document.getElementById('textInput').value||'').trim();
    if(!userText){toast('请输入文字内容');_busy=false;return;}
    content.push({type:'text',text:'请分析以下文字内容：\n\n'+userText+'\n\n'+PROMPT});
  } else {
    if(!_photos.length){toast('请先上传图片');_busy=false;return;}
    _photos.slice(0,4).forEach(function(p){
      var b64=p.b64.split(',')[1];
      var mm=p.b64.match(/data:([^;]+);/);
      content.push({type:'image',source:{type:'base64',media_type:mm?mm[1]:'image/jpeg',data:b64}});
    });
    content.push({type:'text',text:PROMPT});
  }

  try{
    var raw=await callAI(content);
    var data=parseResult(raw);
    _last=data;
    renderResult(data);
    saveHist(data);
  }catch(err){
    ra.innerHTML='<div class="flag-card f-danger"><div class="flag-row"><div class="flag-ico">&#9888;&#65039;</div>'
      +'<div><div class="flag-tit ft-danger">分析失败</div>'
      +'<div class="flag-txt">请检查网络或 AI 服务，稍后重试。<br>'+(err.message||'')+'</div>'
      +'</div></div></div>';
  }
  btn.className='analyze-btn ab-ready';
  btn.innerHTML='<span style="font-size:16px">&#128260;</span> 重新分析';
  _busy=false;
}

function buildScanUI(){
  var steps=['识别场景类型与内容结构','深度提取关键信息与数据','专业判断与风险评估','生成个性化建议与行动清单'];
  var s=steps.map(function(t,i){
    return '<div class="s-step" id="ss'+i+'"><div class="s-dot sd-wait" id="sd'+i+'"></div>'
      +'<span class="st-wait" id="st'+i+'">'+t+'</span></div>';
  }).join('');
  return '<div class="scan-card"><div class="scan-top">'
    +'<div class="scan-orb"><div class="scan-orb-ring"></div></div>'
    +'<div><div class="scan-title">AI 正在深度分析</div>'
    +'<div class="scan-sub">分析 '+_photos.length+' 张图片 &#183; 预计 8-15 秒</div></div></div>'
    +'<div class="scan-steps">'+s+'</div></div>';
}

function delay(ms){return new Promise(function(r){setTimeout(r,ms);});}
async function animateScan(){
  for(var i=0;i<4;i++){
    await delay(500+Math.random()*600);
    var dot=document.getElementById('sd'+i),txt=document.getElementById('st'+i);
    if(dot)dot.className='s-dot sd-active';
    if(txt)txt.className='st-active';
    if(i>0){
      var pd=document.getElementById('sd'+(i-1)),pt=document.getElementById('st'+(i-1));
      if(pd)pd.className='s-dot sd-done';
      if(pt){pt.className='st-done';pt.textContent='&#10003; '+pt.textContent.replace(/^&#10003;\s*/,'');}
    }
  }
}

async function callAI(content){
  var token='';
  try{var ls=localStorage.getItem('chrono100_auth');if(ls){var s=JSON.parse(ls);token=s.access_token||'';}}catch(x){}
  
  // Try to get token from Supabase session stored under different keys
  if (!token) {
    var keys = ['chrono100_auth', 'sb-flerfkkbzrnxreszxmcd-auth-token', 'supabase.auth.token'];
    for (var i = 0; i < keys.length; i++) {
      try {
        var raw = localStorage.getItem(keys[i]);
        if (raw) {
          var parsed = JSON.parse(raw);
          token = (parsed.access_token) || (parsed.currentSession && parsed.currentSession.access_token) || '';
          if (token) break;
        }
      } catch(x) {}
    }
  }

  var res=await fetch(EDGE+'/'+FUNC,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||AKEY),'apikey':AKEY},
    body:JSON.stringify({messages:[{role:'user',content:content}],max_tokens:2000})
  });
  if(!res.ok){
    var errText=await res.text();
    throw new Error('HTTP '+res.status+': '+errText.slice(0,200));
  }
  var d=await res.json();
  return d.text||d.content||'';
}

function parseResult(raw){
  if(!raw)throw new Error('Empty response');
  var c=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  var s=c.indexOf('{'),en=c.lastIndexOf('}');
  if(s>=0&&en>s)c=c.slice(s,en+1);
  try{return JSON.parse(c);}
  catch(x){return{scene:'general',sceneLabel:'内容分析',sceneIcon:'&#128196;',judgment:raw,actions:[],flags:[],deepInsight:''};}
}

var CC={'meeting':'cc-meeting','homework':'cc-homework','classroom':'cc-classroom',
  'work':'cc-work','finance':'cc-finance','reading':'cc-reading','diary':'cc-general','general':'cc-general'};
var CT={'meeting':'ct-meeting','homework':'ct-homework','classroom':'ct-classroom',
  'work':'ct-work','finance':'ct-finance','reading':'ct-reading','diary':'ct-work','general':'ct-general'};

function renderResult(d){
  if(!d)return;
  var sc=d.scene||'general';
  var html='<div class="results">';

  // Scene badge
  html+='<div class="scene-badge"><div class="scene-ico">'+esc(d.sceneIcon||'&#128196;')+'</div>'
    +'<div><div class="scene-type">'+esc(d.sceneLabel||sc)+'</div>'
    +'<div class="scene-desc">'+(d.extracted&&d.extracted.summary?esc(d.extracted.summary):'AI 分析完成')+'</div></div>'
    +'<div class="conf-badge">'+(d.confidence==='高'?'&#10003; 高置信':'~ 中等')+'</div></div>';

  // Judgment
  if(d.judgment){
    html+='<div class="core-card '+(CC[sc]||'cc-general')+'">'
      +'<div class="cc-head"><div class="cc-ico" style="background:rgba(56,189,248,0.12)">'+esc(d.sceneIcon||'&#127919;')+'</div>'
      +'<div class="cc-lbl">核心判断</div></div>'
      +'<div class="cc-text '+(CT[sc]||'ct-general')+'" id="judEl"></div></div>';
  }

  // Key points
  if(d.extracted&&(d.extracted.keyPoints||[]).length){
    html+='<div class="ext-card"><div class="card-lbl">关键信息</div><div class="ext-body">';
    if(d.extracted.keyData)html+='<span class="h-blue">核心数据：</span>'+esc(d.extracted.keyData)+'<br><br>';
    (d.extracted.keyPoints||[]).forEach(function(p){html+='<span class="h-emerald">&#183;</span> '+esc(p)+'<br>';});
    html+='</div></div>';
  }

  // Homework: parent + child
  if((sc==='homework'||sc==='classroom')&&(d.parentNote||d.childNote)){
    if(d.parentNote)html+='<div class="flag-card f-warn"><div class="flag-row"><div class="flag-ico">&#128106;</div>'
      +'<div><div class="flag-tit ft-warn">给家长</div><div class="flag-txt">'+esc(d.parentNote)+'</div></div></div></div>';
    if(d.childNote)html+='<div class="flag-card f-good"><div class="flag-row"><div class="flag-ico">&#11088;</div>'
      +'<div><div class="flag-tit ft-good">给孩子</div><div class="flag-txt">'+esc(d.childNote)+'</div></div></div></div>';
  }

  // Actions
  var acts=d.actions||[];
  if(acts.length){
    var hi=acts.some(function(a){return a.urgency==='high';});
    html+='<div class="actions-card"><div class="ac-head"><div class="card-lbl">行动建议</div>'
      +(hi?'<div class="ac-badge acb-red">&#9889; 今日必处理</div>':'<div class="ac-badge acb-gold">行动清单</div>')+'</div>';
    var NC=['n1','n2','n3','n4'];
    acts.forEach(function(a,i){
      var dc=a.deadline==='今天'?'at-today':a.deadline==='本周'?'at-week':a.deadline==='本月'?'at-later':'at-long';
      html+='<div class="ac-row"><div class="ac-num '+(NC[i]||'n4')+'">'+(i+1)+'</div>'
        +'<div class="ac-body"><div class="ac-title">'+esc(a.title||'')+'</div>'
        +'<div class="ac-detail">'+esc(a.detail||'')+'</div>'
        +'<div class="ac-tags"><div class="at '+dc+'">'+esc(a.deadline||'')+'</div></div>'
        +'</div></div>';
    });
    html+='</div>';
  }

  // Flags
  (d.flags||[]).forEach(function(f){
    var fc=f.type==='danger'?'f-danger':f.type==='warn'?'f-warn':f.type==='good'?'f-good':'f-insight';
    var ftc=f.type==='danger'?'ft-danger':f.type==='warn'?'ft-warn':f.type==='good'?'ft-good':'ft-insight';
    var ico=f.type==='danger'?'&#128680;':f.type==='warn'?'&#9888;&#65039;':f.type==='good'?'&#9989;':'&#128161;';
    html+='<div class="flag-card '+fc+'"><div class="flag-row"><div class="flag-ico">'+ico+'</div>'
      +'<div><div class="flag-tit '+ftc+'">'+esc(f.title||'')+'</div>'
      +'<div class="flag-txt">'+esc(f.text||'')+'</div></div></div></div>';
  });

  // Deep insight
  if(d.deepInsight)html+='<div class="deep-card"><div class="deep-lbl">&#10022; 深度洞察</div>'
    +'<div class="deep-txt">'+esc(d.deepInsight)+'</div></div>';

  // Save
  html+='<div class="save-section"><div class="save-meta"><div class="save-meta-ico">&#128506;</div>'
    +'<div class="save-meta-txt">&#8220;'+esc(d.memoryTitle||'今日记录')+'&#8221; &#8212; 存入人生轨迹</div>'
    +'<div class="save-meta-badge">AI 生成</div></div>'
    +'<div class="save-row">'
    +'<div class="s-btn s-primary" onclick="saveRecord()">&#128204; 存入轨迹</div>'
    +'<div class="s-btn s-sec" onclick="doShare()">分享</div>'
    +'<div class="s-btn s-sec" onclick="clearAll()" style="flex:0.6">重拍</div>'
    +'</div></div>';

  html+='</div>';
  document.getElementById('resultsArea').innerHTML=html;
  if(d.judgment)streamText('judEl',d.judgment,13);
  setTimeout(function(){document.getElementById('resultsArea').scrollIntoView({behavior:'smooth',block:'start'});},100);
}

function streamText(id,text,spd){
  var el=document.getElementById(id);if(!el)return;
  var i=0,chars=text.split('');
  el.innerHTML='<span class="cur"></span>';
  var iv=setInterval(function(){
    if(i>=chars.length){clearInterval(iv);el.innerHTML=esc(text);return;}
    el.innerHTML=esc(text.slice(0,++i))+'<span class="cur"></span>';
  },spd||14);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

function saveRecord(){
  if(!_last)return;
  try{
    var rs=JSON.parse(localStorage.getItem('c100_ai_records')||'[]');
    rs.unshift({id:Date.now(),title:_last.memoryTitle||'记录',scene:_last.scene,
      sceneLabel:_last.sceneLabel,sceneIcon:_last.sceneIcon,
      judgment:_last.judgment,deepInsight:_last.deepInsight,time:Date.now()});
    localStorage.setItem('c100_ai_records',JSON.stringify(rs.slice(0,100)));
  }catch(x){}
  toast('&#10003; 已存入人生轨迹');
}

function doShare(){
  if(!_last)return;
  var txt=(_last.memoryTitle||'今日记录')+'\n\n'+(_last.judgment||'').slice(0,120)+'&#8230;';
  if(navigator.share)navigator.share({title:'CHRONO100 AI感知',text:txt});
  else{try{navigator.clipboard.writeText(txt);toast('&#128203; 已复制');}catch(x){toast('分享需要HTTPS');}}
}

function saveHist(d){
  _hist.unshift({scene:d.scene,sceneLabel:d.sceneLabel,sceneIcon:d.sceneIcon,
    title:d.memoryTitle||d.sceneLabel||'记录',preview:(d.judgment||'').slice(0,100),
    time:Date.now(),data:d});
  if(_hist.length>50)_hist=_hist.slice(0,50);
  try{localStorage.setItem('c100_ai_v2',JSON.stringify(_hist));}catch(x){}
}

function openHistory(){
  document.getElementById('histPanel').style.display='flex';
  var body=document.getElementById('histBody');
  if(!_hist.length){
    body.innerHTML='<div class="hp-empty"><div class="hp-empty-ico">&#128505;</div>'
      +'<div class="hp-empty-txt">还没有分析记录<br>拍一张照片开始</div></div>';
    return;
  }
  body.innerHTML=_hist.map(function(item,i){
    var d=new Date(item.time);
    var ds=(d.getMonth()+1)+'月'+d.getDate()+'日 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="hp-item" onclick="loadHist('+i+')">'
      +'<div class="hp-ico">'+esc(item.sceneIcon||'&#128196;')+'</div>'
      +'<div class="hp-content"><div class="hp-title">'+esc(item.title||'记录')+'</div>'
      +'<div class="hp-preview">'+esc(item.preview||'')+'</div>'
      +'<div class="hp-date">'+esc(item.sceneLabel||'')+' &#183; '+ds+'</div>'
      +'</div></div>';
  }).join('');
}

function closeHistory(){document.getElementById('histPanel').style.display='none';}

function loadHist(i){
  closeHistory();
  var item=_hist[i];if(!item||!item.data)return;
  _last=item.data;_photos=[];
  document.getElementById('resultsArea').innerHTML='';
  document.getElementById('analyzeBtn').style.display='flex';
  resetZone();
  renderResult(item.data);
}
